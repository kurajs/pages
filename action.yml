# kurajs/pages — action.yml  (composite action, published as `uses: kurajs/pages@v1`)
name: "Kura Pages"
description: "Build a Kura docs site from kura.toml + docs/, and deploy it to GitHub Pages."
author: "kurajs"
branding:
  icon: "book-open"
  color: "purple"

inputs:
  config:
    description: "Path to kura.toml."
    default: "kura.toml"
  docs:
    description: "Docs source directory to render."
    default: "docs"
  homepage:
    description: "Homepage source: 'auto' (index.md if present, else README.md), 'readme', 'index', or 'landing' (let Kura generate one)."
    default: "auto"
  base-path:
    description: "Deploy base path. 'auto' derives it (repo-level custom domain or owner.github.io page -> ''; otherwise a project page -> '/<repo>'), or set an explicit value like '/docs'."
    default: "auto"
  embed:
    description: "Build the semantic (vector) search index too. 'false' keeps the fast, model-free BM25 client search."
    default: "false"
  deploy:
    description: "Deploy the built site to the gh-pages branch. Set 'false' to only build (see the `dir` output)."
    default: "true"
  cli-version:
    description: "Version range for @kurajs/cli."
    default: ">=0.0.27 <0.1.0"
  docs-version:
    description: "Version range for @kurajs/docs."
    default: ">=0.0.49 <0.1.0"
  bun-version:
    description: "Bun version."
    default: "1.3.14"

outputs:
  dir:
    description: "Path to the built static site (for a custom deploy step)."
    value: ${{ steps.build.outputs.dir }}

runs:
  using: "composite"
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    # The build logic lives in scripts/build.sh (+ scripts/set_base_path.py) so it can be shellcheck'd
    # and unit-friendly, rather than as a large inline block. It is driven entirely by these env vars.
    - id: build
      shell: bash
      env:
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        # Native link resolution (kura >=0.0.27): the build dir holds a COPY of docs/, so point the
        # CLI at the real checkout and declare where the copied tree lives in the repo. GITHUB_SHA
        # (automatic) becomes the blob ref, GITHUB_REPOSITORY the repo URL.
        KURA_REPO_ROOT: ${{ github.workspace }}
        KURA_SOURCE_MAP: '{"content/docs":"${{ inputs.docs }}"}'
        BASE_PATH_INPUT: ${{ inputs.base-path }}
        HOMEPAGE: ${{ inputs.homepage }}
        EMBED: ${{ inputs.embed }}
        DOCS_DIR: ${{ inputs.docs }}
        CONFIG: ${{ inputs.config }}
        DOCS_VERSION: ${{ inputs.docs-version }}
        CLI_VERSION: ${{ inputs.cli-version }}
      run: bash "$GITHUB_ACTION_PATH/scripts/build.sh"

    - if: ${{ inputs.deploy == 'true' }}
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ github.token }}
        publish_dir: ${{ steps.build.outputs.dir }}
        commit_message: "docs: publish Kura site (${{ github.sha }})"
